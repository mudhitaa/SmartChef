{# assistant/_widget.html #}
<div id="sc-assistant-root" class="sc-widget-closed" aria-hidden="true">
    <button id="sc-assistant-toggle" class="sc-assistant-bubble" aria-label="Open SmartChef Assistant">
        <i class="fas fa-robot"></i>
    </button>

    <div id="sc-assistant-panel" class="sc-assistant-panel" role="dialog" aria-modal="false">
        <div class="sc-panel-header">
            <div class="sc-panel-title"><i class="fas fa-robot"></i> SmartChef AI</div>
            <button id="sc-assistant-close" class="sc-close-btn" aria-label="Close">✕</button>
        </div>

        <div id="sc-assistant-body" class="sc-panel-body">
            <!-- Chat messages -->
            <div id="sc-chat" class="sc-chat"></div>
        </div>

        <div class="sc-panel-footer">
            <input id="sc-input" type="text" placeholder="Ask about recipes, ingredients, substitutions..."
                autocomplete="off">
            <button id="sc-send" class="sc-send-btn" aria-label="Send"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>
