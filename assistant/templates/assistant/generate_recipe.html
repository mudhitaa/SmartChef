{% extends "base.html" %}
{% block title %}Generate Recipe | SmartChef{% endblock %}

{% block content %}

<section class="generate-wrapper">

    <!-- FORM -->
    <div id="generate-form-box" class="generate-form-box">
        <h2>Generate Recipe with SmartChef AI</h2>

        <form id="recipeForm" class="generate-form">
            {% csrf_token %}

            <input type="text" name="recipe_name" placeholder="Recipe Name (optional)">
            <textarea name="ingredients" placeholder="Enter ingredients (comma separated)"></textarea>
            <input type="number" name="servings" placeholder="Servings (e.g., 2)" required>
            <input type="text" name="time_required" placeholder="Time Required (e.g., 30 minutes)" required>
            <input type="text" name="allergies" placeholder="Allergies specifications (optional)">
            <input type="text" name="extra_requests" placeholder="Example:low carb, spicy, keto-friendly, etc.">

            <button type="submit" class="btn">Generate Recipe</button>

            <!-- NEW Toggle Button --> 
             <button type="button" id="viewResultBtn" class="btn" style="display:none;"> 
                View Generated Recipe → 
            </button>
        </form>
    </div>

    <!-- RESULT -->
    <div id="generate-result-box" class="generate-result-box">        
        <div id="recipe-response" class="recipe-card-gen"></div>
        <button id="backToForm">← Back to Form</button>

    </div>
    

</section>


<script>
const formBox = document.getElementById("generate-form-box");
const resultBox = document.getElementById("generate-result-box");
const viewBtn = document.getElementById("viewResultBtn");
const recipeResponse = document.getElementById("recipe-response");

document.getElementById("recipeForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const formData = {
        recipe_name: this.recipe_name.value,
        ingredients: this.ingredients.value,
        servings: this.servings.value,
        time_required: this.time_required.value,
        allergies: this.allergies.value,
        extra_requests: this.extra_requests.value
    };

    try {
        const response = await fetch("/assistant/generate-recipe/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData),
        });

        const data = await response.json();

        if (data.answer) {
            recipeResponse.innerHTML = data.answer;  // Direct HTML render
            formBox.classList.add("hide");
            resultBox.classList.add("active");
            viewBtn.style.display = "block";
        } else {
            recipeResponse.innerHTML = `<p style="color:red;">${data.error}</p>`;
        }

    } catch (error) {
        recipeResponse.innerHTML = `<p style="color:red;">Something went wrong.</p>`;
    }
});

/* View Result Button */
viewBtn.addEventListener("click", function () {
    formBox.classList.add("hide");
    resultBox.classList.add("active");
});

/* Back Button */
document.getElementById("backToForm").addEventListener("click", function () {
    resultBox.classList.remove("active");
    formBox.classList.remove("hide");
});
</script>

{% endblock %}
