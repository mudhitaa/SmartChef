{% extends "base.html" %}
{% block title %}Generate Recipe | SmartChef{% endblock %}

{% block content %}
<section class="upload-section">
    <h2>Generate Recipe with SmartChef AI</h2>

    <form id="recipeForm" method="POST" class="upload-form">
        {% csrf_token %}

        <input type="text" name="recipe_name" placeholder="Recipe Name (optional)">

        <textarea name="ingredients" placeholder="Enter ingredients (comma separated)" required></textarea>

        <input type="number" name="servings" placeholder="Servings (e.g., 2)" required>

        <input type="text" name="time_required" placeholder="Time Required (e.g., 30 minutes)" required>

        <input type="text" name="allergies" placeholder="Allergies to avoid (optional)">

        <button type="submit">Generate Recipe</button>
    </form>

    <div id="ai-result" class="ai-output" style="display:none; margin-top: 20px;">
        <h3>SmartChef AI Result</h3>
        <div id="recipe-response"></div>
    </div>

</section>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    document.getElementById("recipeForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const formData = {
            recipe_name: this.recipe_name.value,
            ingredients: this.ingredients.value,
            servings: this.servings.value,
            time_required: this.time_required.value,
            allergies: this.allergies.value,
        };

        const response = await fetch("/assistant/generate-recipe/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData),
        });

        const data = await response.json();
        document.getElementById("ai-result").style.display = "block";
        document.getElementById("recipe-response").innerHTML = marked.parse(data.answer || data.error);
    });

</script>
{% endblock %}
