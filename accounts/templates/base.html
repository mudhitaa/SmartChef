{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}SmartChef{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}?v={% now "U" %}">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet"> 
</head>

<body>

<!-- Navbar -->
<header class="dashboard-header">
    <div class="logo">
        <img src="{% static 'images/chef.png' %}" alt="Chef Logo">
        <span class="logo-text">SMARTCHEF</span>
    </div>

    <div class="search-bar">
        <form method="GET" action="{% url 'dashboard_home' %}">
            <input type="text" name="q" placeholder="Search recipes or users..."
                   value="{{ query|default:'' }}">
        </form>
    </div>

    
    <nav class="nav-links">
        <a href="{% url 'dashboard_home' %}" title="Home"><i class="fas fa-home"></i></a>
        <a href="{% url 'dashboard_profile' request.user.username %}" title="Profile"><i class="fas fa-user"></i></a>

        <div class="notification-wrapper {% if request.path == '/notifications/' %}no-dropdown{% endif %}">
            <a href="{% url 'notifications' %}" class="notification-icon" id="notif-bell">

                <i class="fas fa-bell"></i>
                <span class="notification-badge" id="notif-count" style="display:none;">
                    {{ unread_notifications_count }}
                </span>
            </a>

            <!-- Dropdown -->
            <div class="notif-dropdown" id="notif-dropdown">
                <div id="notif-preview">
                    <p style="padding:10px;">Loading...</p>
                </div>

            </div>
        </div>


        <a href="/assistant/generate/" title="AI Recipe Maker">
            <i class="fas fa-utensils"></i>
        </a>
        <a href="{% url 'settings' %}" class="settings-icon" title="Settings"><i class="fas fa-cog"></i></a>
    </nav>



</header>

<!-- Messages -->
{% if messages %}
<div id="msg-container" class="messages-container">
    {% for message in messages %}
        <div class="alert {{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
</div>
{% endif %}

<!-- Page Content -->
<main>
    {% block content %}{% endblock %}
</main>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const preview = document.getElementById("notif-preview");
    const count = document.getElementById("notif-count");

    function loadNotifications() {
        fetch("{% url 'notifications_preview' %}")
            .then(response => response.json())
            .then(data => {

                // Update dropdown content (unread only)
                preview.innerHTML = data.html;

        if (data.unread_count > 0) {
            count.style.display = "inline-block";
            count.textContent = data.unread_count;
        } else {
            count.style.display = "none";
        }

                
            })
            .catch(error => console.error("Error:", error));
    }

    // Load once when page loads
    loadNotifications();

    // Auto refresh every 15 seconds
    setInterval(loadNotifications, 15000);

});
</script>




</body>

</html>
